<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Icon Preview</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8fafc; margin: 0; padding: 40px; }
    h2 { color: #1e293b; margin-bottom: 32px; font-size: 18px; font-weight: 600; }
    .grid { display: flex; flex-direction: column; gap: 16px; max-width: 480px; }
    .card {
      display: flex; align-items: center; gap: 20px;
      background: white; border: 1.5px solid #e2e8f0; border-radius: 14px;
      padding: 18px 22px; cursor: pointer; transition: all 0.15s;
    }
    .card:hover { border-color: #6366f1; box-shadow: 0 0 0 3px #6366f120; }
    .num {
      width: 28px; height: 28px; border-radius: 50%;
      background: #f1f5f9; color: #64748b; font-size: 13px;
      font-weight: 700; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .icon-wrap { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: #334155; flex-shrink: 0; }
    .icon-wrap svg { width: 26px; height: 26px; stroke-width: 1.75; }
    .label { font-size: 15px; font-weight: 600; color: #1e293b; }
    .desc { font-size: 12px; color: #94a3b8; margin-top: 2px; }
  </style>
</head>
<body>
  <h2>Choose your Appointments icon</h2>
  <div class="grid">
    <div class="card">
      <div class="num">1</div>
      <div class="icon-wrap"><i data-lucide="calendar-check-2"></i></div>
      <div><div class="label">CalendarCheck2 <span style="font-size:11px;color:#6366f1;margin-left:6px;">← current</span></div><div class="desc">Confirmed scheduling</div></div>
    </div>
    <div class="card">
      <div class="num">2</div>
      <div class="icon-wrap"><i data-lucide="calendar-clock"></i></div>
      <div><div class="label">CalendarClock</div><div class="desc">Time-aware sessions</div></div>
    </div>
    <div class="card">
      <div class="num">3</div>
      <div class="icon-wrap"><i data-lucide="book-open"></i></div>
      <div><div class="label">BookOpen</div><div class="desc">Session records &amp; case logs</div></div>
    </div>
    <div class="card">
      <div class="num">4</div>
      <div class="icon-wrap"><i data-lucide="handshake"></i></div>
      <div><div class="label">Handshake</div><div class="desc">Supportive meetings</div></div>
    </div>
    <div class="card">
      <div class="num">5</div>
      <div class="icon-wrap"><i data-lucide="heart-handshake"></i></div>
      <div><div class="label">HeartHandshake</div><div class="desc">Warm, wellbeing-focused</div></div>
    </div>
    <div class="card">
      <div class="num">6</div>
      <div class="icon-wrap"><i data-lucide="notebook-pen"></i></div>
      <div><div class="label">NotebookPen</div><div class="desc">Session journaling</div></div>
    </div>
    <div class="card">
      <div class="num">7</div>
      <div class="icon-wrap"><i data-lucide="message-square-dot"></i></div>
      <div><div class="label">MessageSquareDot</div><div class="desc">1-on-1 conversations</div></div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
