<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="any" />
        <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
        <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon-192.png" />
        <meta name="description" content="WellTrack — MTSS student wellbeing platform for Australian schools" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet" />
        <title>WellTrack — MTSS Wellbeing Platform</title>
        <script>
          // Blank the tab title before React mounts so subdomain/inner pages
          // don't flash the landing page title while loading. The landing page
          // (root domain + "/" path) keeps the default title above.
          (function () {
            try {
              var host = window.location.hostname || '';
              var path = window.location.pathname || '/';
              var base = '%REACT_APP_BASE_DOMAIN%';
              var isSubdomain = base && host.endsWith('.' + base) && host !== 'www.' + base;
              var isRootPath = path === '/' || path === '/index.html' || path === '';
              if (isSubdomain || !isRootPath) {
                document.title = '';
              }
            } catch (e) { /* noop */ }
          })();
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
